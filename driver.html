<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="theme-color" content="#0a1628"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Fahrer"/>
<meta name="apple-mobile-web-app-starturl" content="driver.html?source=pwa"/>
<link rel="manifest" href="manifest-driver.json"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<title>TaxiPro Fahrer</title>
<style>
:root{--bg:#0a1628;--text:#e8f4fc;--teal:#14b8a6;--blue:#38bdf8;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;padding-top:calc(24px + var(--safe-top));padding-bottom:calc(24px + var(--safe-bottom))}
.logo{font-size:24px;font-weight:800;margin-bottom:8px;color:var(--blue)}
.logo em{color:var(--teal);font-style:normal}
.sub{font-size:14px;opacity:.8;text-align:center;line-height:1.5;margin-bottom:24px;color:#94b8d4}
.spinner{width:40px;height:40px;border:3px solid rgba(20,184,166,.2);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
a{color:var(--teal)}
</style>
</head>
<body>
<div class="spinner" aria-hidden="true"></div>
<div class="logo">TaxiPro <em>Fahrer</em></div>
<p class="sub">Wird geladen…</p>
<script>
(function(){
  var p=new URLSearchParams(location.search);
  if(location.hash.length>1){new URLSearchParams(location.hash.slice(1)).forEach(function(v,k){if(!p.has(k))p.set(k,v);});}
  var boot=p.get('boot'),token=p.get('t')||p.get('token'),id=p.get('d'),pin=p.get('p');
  var sy=p.get('sy'),pu=p.get('pu');
  try{
    localStorage.setItem('tp_app_role','driver');
    if(boot){localStorage.setItem('tp_driver_boot',boot);sessionStorage.setItem('tp_driver_boot',boot);}
    if(token){localStorage.setItem('tp_driver_token',token);sessionStorage.setItem('tp_driver_token',token);}
    if(id) localStorage.setItem('tp_driver_id',id);
    if(pin) localStorage.setItem('tp_driver_pin',pin);
    if(p.get('fn')) localStorage.setItem('tp_driver_fn',p.get('fn'));
    if(p.get('ln')) localStorage.setItem('tp_driver_ln',p.get('ln'));
    if(sy) localStorage.setItem('tp_sync_folder_url',sy);
    if(pu) localStorage.setItem('tp_public_sync_url',pu);
    if(!token) token=localStorage.getItem('tp_driver_token');
    if(!id) id=localStorage.getItem('tp_driver_id');
    if(!pin) pin=localStorage.getItem('tp_driver_pin');
    if(!boot) boot=localStorage.getItem('tp_driver_boot');
  }catch(e){}
  var qs=new URLSearchParams();
  qs.set('mode','driver');
  if(p.get('source')) qs.set('source',p.get('source'));
  if(id) qs.set('d',id);
  if(token) qs.set('t',token);
  if(pin) qs.set('p',pin);
  if(p.get('fn')) qs.set('fn',p.get('fn'));
  if(p.get('ln')) qs.set('ln',p.get('ln'));
  if(sy) qs.set('sy',sy);
  if(pu) qs.set('pu',pu);
  if(boot) qs.set('boot',boot);
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./service-worker.js',{scope:'./'}).catch(function(){});
  }
  location.replace('index.html?'+qs.toString());
})();
</script>
<noscript><p><a href="index.html?mode=driver">TaxiPro Fahrer-App öffnen</a></p></noscript>
</body>
</html>
